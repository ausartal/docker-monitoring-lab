[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          record_modifier
    Match         *
    Record        host demo-lab

[OUTPUT]
    Name          pgsql
    Match         *
    Host          postgres-main
    Port          5432
    User          labuser
    Password      labpass123
    Database      labdb
    Table         fluentbit
    Schema        logs
    Timestamp_Key time

[OUTPUT]
    Name          stdout
    Match         *
    Format        json_lines
