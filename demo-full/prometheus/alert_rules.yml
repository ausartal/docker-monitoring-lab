groups:
  - name: demo-alerts
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "High CPU on {{ $labels.instance }}"}
      - alert: LowMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 20
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "Low memory on {{ $labels.instance }}"}
      - alert: HighDiskUsage
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 > 85
        for: 5m
        labels: {severity: warning}
        annotations: {summary: "High disk on {{ $labels.instance }}"}
