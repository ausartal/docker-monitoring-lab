services:
  # GIT SERVER: Gitea
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__SSH_DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3001
      - GITEA__server__HTTP_PORT=3001
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__webhook__SKIP_TLS_VERIFY=true
    ports:
      - "3001:3001"
      - "2222:22"
    volumes:
      - gitea-data:/data
    networks:
      - cicd-net
    restart: unless-stopped

  # CI/CD SERVER: Drone
  drone-server:
    image: drone/drone:latest
    container_name: drone-server
    environment:
      - DRONE_GITEA_SERVER=http://gitea:3001
      - DRONE_GITEA_CLIENT_ID=${DRONE_GITEA_CLIENT_ID}
      - DRONE_GITEA_CLIENT_SECRET=${DRONE_GITEA_CLIENT_SECRET}
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_SERVER_HOST=localhost:3002
      - DRONE_SERVER_PROTO=http
      - DRONE_USER_CREATE=username:pens-admin,admin:true
      - DRONE_DATABASE_DRIVER=sqlite3
      - DRONE_DATABASE_DATASOURCE=/data/database.sqlite
    ports:
      - "3002:80"
    volumes:
      - drone-data:/data
    networks:
      - cicd-net
    depends_on:
      - gitea
    restart: unless-stopped

  # CI/CD RUNNER: Drone Docker Runner
  drone-runner:
    image: drone/drone-runner-docker:latest
    container_name: drone-runner
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone-server
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_RUNNER_NAME=local-runner
      - DRONE_RUNNER_VOLUMES=/var/run/docker.sock:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd-net
    depends_on:
      - drone-server
    restart: unless-stopped

volumes:
  gitea-data:
  drone-data:

networks:
  cicd-net:
