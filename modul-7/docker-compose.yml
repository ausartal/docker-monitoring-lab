services:
  # Nginx dengan read-only filesystem dan resource limits
  nginx-web:
    image: nginx:alpine
    container_name: nginx-web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
      - /tmp/nginx-cache:/var/cache/nginx
      - /tmp/nginx-pid:/var/run
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - app-net
    depends_on:
      - flask-app
    restart: unless-stopped

  # Flask App dengan non-root user, secrets mount, dan resource limits
  flask-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: flask-app-secure
    secrets:
      - db_user
      - db_password
      - db_name
      - db_host
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - app-net
      - db-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL dengan resource limits
  db:
    image: postgres:16-alpine
    container_name: postgres-db-secure
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

secrets:
  db_user:
    file: ./secrets/db_user
  db_password:
    file: ./secrets/db_password
  db_name:
    file: ./secrets/db_name
  db_host:
    file: ./secrets/db_host

volumes:
  pg-data:

networks:
  app-net:
  db-net:
